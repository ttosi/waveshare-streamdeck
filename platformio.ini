[env:esp32-s3-devkitm-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitm-1
framework = arduino

build_flags =
    -Iinclude
    -DLV_CONF_INCLUDE_SIMPLE
    -DESP_PANEL_BOARD_INCLUDE_CUSTOM_CONFIG
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM

build_unflags =
    -DARDUINO_USB_MODE=1

board_build.flash_size = 8MB
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs
upload_protocol = esptool
upload_port = /dev/ttyACM0
upload_speed = 921600
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
monitor_port = /dev/ttyACM0

lib_deps =
    lvgl/lvgl@8.4.0
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git#v1.0.4
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v1.1.1
    https://github.com/esp-arduino-libs/esp-lib-utils.git#v0.2.3
